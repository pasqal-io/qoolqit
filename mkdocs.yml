site_name: QoolQit
repo_url: "https://github.com/pasqal-io/qoolqit"
repo_name: "QoolQit"

nav:
  - Overview: index.md
  - Get started:
    - Install: get_started/install.md
    - Programming a neutral atom QPU: get_started/qoolqit_model.md
    - Programming with QoolQit: get_started/programming_with_qoolqit.ipynb
  - Fundamentals:
    - fundamentals/introduction.md
    - Graphs: fundamentals/graphs.ipynb
    - Embedding: fundamentals/embedding.ipynb
    - Quantum Program: fundamentals/quantum_program.ipynb
    - Compilation:
      - Compiling a Quantum Program: fundamentals/compilation/rationale.md
      - Devices and Compilation: fundamentals/compilation/device_and_compilation.ipynb
      - Error handling: fundamentals/compilation/error_handling.ipynb
    - Execution:
      - fundamentals/execution/execution.ipynb
  - Extended usage:
    - Adimensionalization: extended_usage/adimensionalization.md
    - Emulation configuration: extended_usage/execution_config.md
    - Custom embedders: extended_usage/custom_embedders.md
    - Custom waveforms: extended_usage/custom_waveforms.ipynb
  - Applications:
    - tutorials/index.md
    - Solving a QUBO: tutorials/solving_a_qubo.ipynb
  - API reference:
    - qoolqit: reference/qoolqit.md
    - qoolqit.embedding: reference/embedding.md
    - qoolqit.graphs: reference/graphs.md
    - qoolqit.register: reference/register.md
    - qoolqit.waveforms: reference/waveforms.md
    - qoolqit.drive: reference/drive.md
    - qoolqit.program: reference/program.md
    - qoolqit.devices: reference/devices.md
    - qoolqit.execution: reference/execution.md
    - qoolqit.exceptions: reference/exceptions.md
  - Contribute:
    - How to contribute: CONTRIBUTING.md
    - Code of conduct: CODE_OF_CONDUCT.md
    - Contributor Agreement: CONTRIBUTOR_AGREEMENT.md

theme:
  name: material
  custom_dir: docs/extras/overrides/
  logo: extras/assets/logo/qoolqit_symbol_white.svg
  features:
    - content.code.copy
    - content.tooltips
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - search.suggest

  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: custom
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: custom
    toggle:
      icon: material/weather-night
      name: Switch to light mode

markdown_extensions:
- admonition
- pymdownx.arithmatex:
    generic: true
- pymdownx.highlight:
    default_lang: python
    anchor_linenums: true
    use_pygments: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.magiclink
- pymdownx.superfences
- md_in_html

plugins:
- search
- section-index
- markdown-exec
- autorefs
- mkdocs-jupyter:
    include: ["*.ipynb"]
    include_requirejs: true
    custom_mathjax_url: "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_CHTML-full,Safe"
- mkdocstrings:
    handlers:
      python:
        paths: [qoolqit]
        options:
          backlinks: tree
          docstring_options:
            ignore_init_summary: true
          docstring_section_style: list
          filters: public
          heading_level: 1
          inherited_members: true
          merge_init_into_class: true
          parameter_headings: true
          type_parameter_headings: true
          preload_modules: [qoolqit]
          relative_crossrefs: true
          scoped_crossrefs: true
          show_bases: false
          show_inheritance_diagram: false
          show_root_heading: true
          show_root_full_path: false
          show_signature_annotations: true
          show_signature_type_parameters: true
          show_source: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          signature_crossrefs: true
          summary: true
          unwrap_annotated: true

# For mathjax
extra_javascript:
  - extras/javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - qoolqit

extra:
 version:
   provider: mike

# To get nice tabs
extra_css:
- extras/css/mkdocstrings.css
- extras/css/home.css
- extras/css/colors.css
