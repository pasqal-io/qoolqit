name: Publish QoolQit to PyPI and publish docs

on:
  release:
      types:
        - published

concurrency:
  group: fast-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    publish_pypi:
        name: Publish package to PyPI
        runs-on: ubuntu-latest
        permissions:
            # IMPORTANT: this permission is mandatory for trusted publishing
            id-token: write
        steps:
        - name: Check out QoolQit
          uses: actions/checkout@v7
          with:
            ref: ${{ github.ref }}
        - name: Set up Python
          uses: actions/setup-python@v7
          with:
            python-version: '3.14'
        - name: Install Python dependencies
          run: |
            pip install --upgrade pip
            pip install build
        - name: Build package
          run: |
            python -m build
        - name: Publish to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
        - name: Confirm deployment
          timeout-minutes: 5
          run: |
            VERSION=${GITHUB_REF#refs/tags/v}
            until pip download qoolqit==$VERSION
            do
                echo "Failed to download from PyPI, will wait for upload and retry."
                sleep 1
            done

    publish_docs:
        name: Publish docs to github pages
        runs-on: ubuntu-latest
        steps:
        - name: Checkout QoolQit
          uses: actions/checkout@v7
        - name: Set up Python
          uses: actions/setup-python@v7
          with:
            python-version: '3.14'
        - name: Install QoolQit with development dependencies
          run: |
            pip install -e .[dev]
        - name: Deploy docs
          run: |
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git fetch origin gh-pages
            mike deploy --push --update-aliases ${{ github.ref_name }} latest
