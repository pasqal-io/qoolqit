# Update development version of documentation on successful PR
name: Docs dev version

on:
  pull_request:
    types:
      - closed

jobs:
  publish_dev_docs:
    name: Publish development docs to github pages
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
    - name: Checkout QoolQit
      uses: actions/checkout@v7
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install QoolQit with development dependencies
      run: |
        pip install -e .[dev]
    - name: Deploy docs
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git fetch origin gh-pages
        mike deploy --push --update-aliases main development
